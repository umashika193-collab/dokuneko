<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>毒猫 - Dokuneko</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0a0014">
    <link rel="apple-touch-icon" href="cat_max.png">
    <link rel="stylesheet" href="style.css?v=5">
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js').catch(err => console.log('SW Reg Failed', err));
            });
        }
    </script>
</head>
<body>
    <div class="app-container">
        <header class="header">
            <div class="title-container">
                <h1>毒猫 <span id="level-display" class="level-text">Lv.1</span></h1>
                <p class="subtitle">Psychedelic Puzzle</p>
            </div>
            <div class="status-container">
                <div class="lives" id="lives-container">
                    <span class="heart active">❤️</span>
                    <span class="heart active">❤️</span>
                    <span class="heart active">❤️</span>
                    <span class="heart active">❤️</span>
                    <span class="heart active">❤️</span>
                </div>
            </div>
        </header>

        <div class="rules-container">
            <p><strong>【ルール】</strong>各行・各列・各色ブロックに1匹ずつ猫を配置。猫同士はナナメも含めて隣接不可。</p>
        </div>

        <main class="game-area">
            <div id="grid-container" class="grid">
                <!-- Grid cells will be generated by JS -->
            </div>
        </main>

        <div class="tools-container">
            <button id="btn-pen" class="tool-btn active">
                <img src="cat.png" class="tool-icon-img" alt="cat">
                <span class="tool-label">配置</span>
            </button>
            <button id="btn-pencil" class="tool-btn">
                <span class="tool-icon">❌</span>
                <span class="tool-label">メモ</span>
            </button>
            <button id="btn-erase" class="tool-btn">
                <span class="tool-icon">🧹</span>
                <span class="tool-label">消す</span>
            </button>
        </div>

        <div id="game-over-overlay" class="overlay hidden">
            <div id="praise-container" class="hidden">
                <div class="speech-bubble" id="cat-message"></div>
                <img src="cat_clear.png" id="clear-cat-img" alt="Poison Cat">
            </div>
            <h2 id="overlay-title">GAME OVER</h2>
            <p id="overlay-message">毒に飲まれた...</p>
            <button id="btn-restart" class="action-btn">再挑戦</button>
        </div>

        <div id="ending-screen" class="overlay hidden">
            <div class="credits-container">
                <h2 class="credits-title">THE END</h2>
                
                <p class="credits-role">Player</p>
                <p class="credits-name">俺</p>
                
                <p class="credits-role">AI Developer</p>
                <p class="credits-name">Google Antigravity</p>
                
                <div class="credits-spacer-small"></div>
                <p class="credits-role">Special Thanks</p>
                <div class="credits-spacer-medium"></div>
                <p class="credits-name" style="font-size: 1.8rem; color: #ccc;">Meowdoku</p>
                
                <div class="credits-spacer-large"></div>
                
                <p class="credits-fin">Fin</p>
                <div style="margin-top: 100px;">
                    <button id="btn-ending-continue" class="ending-continue-btn">続けてマタタビ</button>
                </div>
            </div>
        </div>

        <div id="title-screen" class="overlay title-screen">
            <div class="floating-matatabi m1">🌿</div>
            <div class="floating-matatabi m2">🌿</div>
            <div class="floating-matatabi m3">🌿</div>
            <div class="floating-matatabi m4">🌿</div>
            <div class="floating-matatabi m5">🌿</div>
            <div class="floating-matatabi m6">🌿</div>
            <img src="cat_max.png" alt="Dokuneko" id="title-cat-img">
            <h1 class="title-logo">毒猫</h1>
            <p class="title-sub">Psychedelic Puzzle</p>
            <button id="btn-start" class="action-btn">GAME START</button>
        </div>
    </div>

    <script src="sound.js"></script>
    <script src="game.js"></script>
    <script src="ui.js"></script>
</body>
</html>
